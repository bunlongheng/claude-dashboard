<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 16 14" fill="white">
  <!-- Antennae -->
  <rect x="4" y="0" width="2" height="2"/>
  <rect x="7" y="0" width="2" height="2"/>
  <rect x="10" y="0" width="2" height="2"/>
  <!-- Head -->
  <rect x="3" y="2" width="10" height="6"/>
  <!-- Eyes -->
  <rect x="5" y="3" width="2" height="2" fill="black"/>
  <rect x="9" y="3" width="2" height="2" fill="black"/>
  <!-- Ears -->
  <rect x="1" y="5" width="2" height="2"/>
  <rect x="13" y="5" width="2" height="2"/>
  <!-- Mouth gaps -->
  <rect x="5" y="6" width="1" height="1" fill="black"/>
  <rect x="7" y="6" width="2" height="1" fill="black"/>
  <rect x="10" y="6" width="1" height="1" fill="black"/>
  <!-- Legs -->
  <rect x="4" y="9" width="2" height="4"/>
  <rect x="7" y="9" width="2" height="3"/>
  <rect x="10" y="9" width="2" height="4"/>
</svg>
