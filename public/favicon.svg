<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 28" fill="white">
  <rect width="32" height="28" rx="4" fill="#f97316"/>
  <!-- Antennae -->
  <rect x="8" y="0" width="4" height="4"/>
  <rect x="14" y="0" width="4" height="4"/>
  <rect x="20" y="0" width="4" height="4"/>
  <!-- Head -->
  <rect x="6" y="4" width="20" height="12"/>
  <!-- Eyes -->
  <rect x="10" y="6" width="4" height="4" fill="#f97316"/>
  <rect x="18" y="6" width="4" height="4" fill="#f97316"/>
  <!-- Ears -->
  <rect x="2" y="10" width="4" height="4"/>
  <rect x="26" y="10" width="4" height="4"/>
  <!-- Mouth gaps -->
  <rect x="10" y="12" width="2" height="2" fill="#f97316"/>
  <rect x="14" y="12" width="4" height="2" fill="#f97316"/>
  <rect x="20" y="12" width="2" height="2" fill="#f97316"/>
  <!-- Legs -->
  <rect x="8" y="18" width="4" height="8"/>
  <rect x="14" y="18" width="4" height="6"/>
  <rect x="20" y="18" width="4" height="8"/>
</svg>
